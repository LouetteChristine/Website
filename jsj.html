<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mains Gauche et Droite</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }

        textarea {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            resize: vertical;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        input[type="number"] {
            width: 70px;
            padding: 8px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        /* Style identique pour le bouton d'import */
        button, label.import-btn {
            padding: 8px 15px;
            font-size: 16px;
            cursor: pointer;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.2s;
            display: inline-block;
        }

        button:hover, label.import-btn:hover {
            background-color: #004494;
        }

        button:disabled {
            background-color: #aaa;
            cursor: not-allowed;
        }

        /* Cacher l'input file natif */
        #fileInput {
            display: none;
        }

        .display-area {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 800px;
            flex-grow: 1;
            align-items: center;
            margin: 20px 0;
        }

        .hand-box {
            width: 45%;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            padding: 40px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .hand-title {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #666;
        }

        .hand-value {
            font-size: 4rem;
            font-weight: bold;
            color: #0056b3;
        }

        .hand-next {
            font-size: 2rem;
            font-weight: normal;
            color: #ccc;
            margin-top: 15px;
            min-height: 2.5rem;
            transition: color 0.3s;
        }

        .hand-next.changed {
            color: #dc3545;
        }

        .bottom-info {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .countdown-text {
            font-size: 1.2rem;
            font-weight: bold;
            color: #555;
        }

        .progress-track {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1) inset;
        }

        .progress-fill {
            height: 100%;
            background: #0056b3;
            width: 0%;
            transition: width 0.05s linear;
            border-radius: 5px;
        }

        .counter {
            font-size: 1.2rem;
            font-weight: bold;
            color: #555;
            background: white;
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .shortcut-hint {
            font-size: 0.85rem;
            color: #888;
            margin-top: 5px;
            text-align: center;
        }

    </style>
</head>
<body>

    <div class="controls">
        <textarea id="sequenceInput" rows="7" placeholder="Entrez vos valeurs ici (format: gauche : droite)">10d : 18g
10d : 18g
10d : 18g
10d : 18g
10d : 18g
1éd : 15h
1c : 14o</textarea>

        <div class="input-row">
            <label for="secondsInput">Intervalle (s) :</label>
            <input type="number" id="secondsInput" value="2" min="0.1" step="0.1">
            <button id="startBtn">Démarrer</button>
            <button id="pauseBtn" disabled>Pause</button>
            <button id="continueBtn" disabled>Continuer</button>
            
            <!-- Bouton pour importer le fichier -->
            <label for="fileInput" class="import-btn">Importer fichier</label>
            <input type="file" id="fileInput" accept=".txt">
        </div>
    </div>

    <div class="display-area">
        <div class="hand-box">
            <div class="hand-title">Main gauche</div>
            <div class="hand-value" id="gaucheText">-</div>
            <div class="hand-next" id="gaucheNext">-</div>
        </div>

        <div class="hand-box">
            <div class="hand-title">Main droite</div>
            <div class="hand-value" id="droiteText">-</div>
            <div class="hand-next" id="droiteNext">-</div>
        </div>
    </div>

    <div class="bottom-info">
        <div class="countdown-text">Prochain changement dans : <span id="countdownVal">0</span> s</div>
        <div class="progress-track">
            <div class="progress-fill" id="progressBar"></div>
        </div>
        <div class="counter">
            Étape : <span id="stepCounter">0</span> / <span id="totalCounter">0</span>
        </div>
        <div class="shortcut-hint">Astuce : Appuyez sur la barre <b>Espace</b> pour Pause/Continuer</div>
    </div>

    <script>
        let sequence = [];
        let currentIndex = 0;
        let intervalId = null;
        
        let intervalTime = 2;
        let lastUpdateTime = 0;
        const tickRate = 50;

        const gaucheText = document.getElementById('gaucheText');
        const droiteText = document.getElementById('droiteText');
        const gaucheNext = document.getElementById('gaucheNext');
        const droiteNext = document.getElementById('droiteNext');
        
        const stepCounter = document.getElementById('stepCounter');
        const totalCounter = document.getElementById('totalCounter');
        const secondsInput = document.getElementById('secondsInput');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const continueBtn = document.getElementById('continueBtn');
        const sequenceInput = document.getElementById('sequenceInput');
        const countdownVal = document.getElementById('countdownVal');
        const progressBar = document.getElementById('progressBar');
        
        // Référence pour l'import de fichier
        const fileInput = document.getElementById('fileInput');

        function parseSequenceInput(text) {
            const lines = text.trim().split('\n');
            const parsedSeq = [];
            for (let line of lines) {
                if (line.trim() === '') continue; 
                const parts = line.split(':');
                if (parts.length === 2) {
                    parsedSeq.push({
                        gauche: parts[0].trim(),
                        droite: parts[1].trim()
                    });
                }
            }
            return parsedSeq;
        }

        function updateDisplay() {
            if (sequence.length === 0) return;
            
            const step = sequence[currentIndex];
            gaucheText.textContent = step.gauche;
            droiteText.textContent = step.droite;
            stepCounter.textContent = (currentIndex + 1);
            
            let nextIndex = (currentIndex + 1) % sequence.length;
            const nextStep = sequence[nextIndex];
            
            gaucheNext.textContent = nextStep.gauche;
            droiteNext.textContent = nextStep.droite;
            
            if (nextStep.gauche !== step.gauche) {
                gaucheNext.classList.add('changed');
            } else {
                gaucheNext.classList.remove('changed');
            }

            if (nextStep.droite !== step.droite) {
                droiteNext.classList.add('changed');
            } else {
                droiteNext.classList.remove('changed');
            }
            
            currentIndex = nextIndex;
        }

        function tick() {
            const now = Date.now();
            const elapsed = (now - lastUpdateTime) / 1000;
            
            let currentInputTime = parseFloat(secondsInput.value);
            if (!isNaN(currentInputTime) && currentInputTime > 0) {
                intervalTime = currentInputTime;
            }

            const remaining = Math.max(0, intervalTime - elapsed);
            countdownVal.textContent = Math.ceil(remaining);
            
            const progressPercent = (elapsed / intervalTime) * 100;
            progressBar.style.width = Math.min(100, progressPercent) + '%';

            if (elapsed >= intervalTime) {
                updateDisplay();
                lastUpdateTime = Date.now();
            }
        }

        function setButtonStates(state) {
            if (state === 'playing') {
                startBtn.disabled = false;
                pauseBtn.disabled = false;
                continueBtn.disabled = true;
            } else if (state === 'paused') {
                startBtn.disabled = false;
                pauseBtn.disabled = true;
                continueBtn.disabled = false;
            } else {
                startBtn.disabled = false;
                pauseBtn.disabled = true;
                continueBtn.disabled = true;
            }
        }

        function startAnimation() {
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
            }

            sequence = parseSequenceInput(sequenceInput.value);
            if (sequence.length === 0) {
                alert("Veuillez entrer une séquence valide (format: gauche : droite).");
                return;
            }

            totalCounter.textContent = sequence.length;
            currentIndex = 0;

            let seconds = parseFloat(secondsInput.value);
            if (isNaN(seconds) || seconds <= 0) {
                alert("Veuillez entrer un nombre de secondes valide (supérieur à 0).");
                return;
            }

            intervalTime = seconds;
            
            updateDisplay();
            lastUpdateTime = Date.now();
            
            intervalId = setInterval(tick, tickRate);
            setButtonStates('playing');
        }

        function pauseAnimation() {
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
                setButtonStates('paused');
            }
        }

        function continueAnimation() {
            if (!intervalId && sequence.length > 0) {
                lastUpdateTime = Date.now();
                intervalId = setInterval(tick, tickRate);
                setButtonStates('playing');
            }
        }

        startBtn.addEventListener('click', startAnimation);
        pauseBtn.addEventListener('click', pauseAnimation);
        continueBtn.addEventListener('click', continueAnimation);

        // Événement pour lire le fichier importé
        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    // Remplir la zone de texte avec le contenu du fichier
                    sequenceInput.value = e.target.result;
                    // Optionnel : on déclenche le démarrage automatiquement
                    // startAnimation(); 
                };
                reader.readAsText(file);
            }
        });

        // Raccourci clavier Espace
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') {
                    return;
                }
                e.preventDefault();
                if (intervalId) {
                    pauseAnimation();
                } else if (sequence.length > 0) {
                    continueAnimation();
                }
            }
        });
    </script>
</body>
</html>
