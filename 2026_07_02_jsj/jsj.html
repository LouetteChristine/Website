<!DOCTYPE html>
<html lang="fr">
<head>  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mains Gauche et Droite</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #cbcbcb;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- Bouton flottant pour quitter le plein écran --- */
        .exit-fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background-color: #dc3545;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: none; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: background-color 0.2s;
        }
        .exit-fullscreen-btn:hover {
            background-color: #c82333;
        }
        body.fullscreen-active .exit-fullscreen-btn {
            display: block; 
        }

        /* --- Styles pour le mode Plein Écran --- */
        body.fullscreen-active {
            background-color: #1a1a1a;
            justify-content: center;
            padding: 0;
        }
        body.fullscreen-active .controls {
            display: none; 
        }
        body.fullscreen-active .display-area {
            max-width: 90vw;
            margin: 0;
        }
        body.fullscreen-active .hand-box {
            background: #2a2a2a;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        body.fullscreen-active .hand-title { color: #aaa; }
        body.fullscreen-active .hand-value { font-size: 7rem; }
        body.fullscreen-active .hand-next { font-size: 4rem; }
        
        body.fullscreen-active .bottom-info {
            max-width: 90vw;
            margin-top: 20px;
        }
        body.fullscreen-active .countdown-text {
            color: #aaa;
        }
        body.fullscreen-active .progress-track {
            background: #444;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5) inset;
        }
        body.fullscreen-active .progress-fill {
            background: #4a90e2; 
        }
        body.fullscreen-active .counter-wrapper {
            background: #2a2a2a;
            color: #aaa;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        body.fullscreen-active .mini-btn {
            background-color: #444;
            color: #aaa;
            border-color: #555;
        }
        body.fullscreen-active .mini-btn:hover:not(:disabled) {
            background-color: #555;
        }
        body.fullscreen-active .mini-btn:disabled {
            background-color: #333;
            color: #666;
        }
        
        body.fullscreen-active .finger-info {
            color: #aaaaaa;
        }
        body.fullscreen-active .finger-info span b {
            color: #dddddd;
        }
        
        body.fullscreen-active .shortcut-hint {
            display: none;
        }

        @media screen and (max-width: 600px) {
            body.fullscreen-active .display-area {
                flex-direction: column;
                gap: 20px;
            }
            body.fullscreen-active .hand-box {
                width: 90%;
            }
            body.fullscreen-active .hand-value { 
                font-size: 5rem; 
            }
            body.fullscreen-active .hand-next { 
                font-size: 2rem; 
            }
            .input-row {
                flex-direction: column;
                align-items: stretch;
            }
            .input-row .spacer {
                display: none;
            }
            .options-group {
                justify-content: center;
            }
            .playback-controls {
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
            box-sizing: border-box;
        }

        textarea {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            resize: vertical;
        }

        .file-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .spacer {
            flex-grow: 1;
        }

        .options-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        input[type="number"] {
            width: 55px;
            padding: 8px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            text-align: center;
        }

        button, label.import-btn {
            padding: 8px 15px;
            font-size: 16px;
            cursor: pointer;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.2s, transform 0.1s;
            display: inline-block;
        }

        button:hover, label.import-btn:hover {
            background-color: #004494;
        }

        button:active {
            transform: scale(0.97);
        }

        button:disabled {
            background-color: #aaa;
            cursor: not-allowed;
            transform: none;
        }

        #fileInput {
            display: none;
        }

        .loop-container {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
        }
        
        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .playback-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 5px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .playback-controls button {
            min-width: 90px;
            font-weight: bold;
            padding: 10px 15px;
        }

        #startBtn { background-color: #28a745; }
        #startBtn:hover:not(:disabled) { background-color: #218838; }

        #pauseBtn { background-color: #ffc107; color: #333; }
        #pauseBtn:hover:not(:disabled) { background-color: #e0a800; }

        #prevBtn, #nextBtn { background-color: #6c757d; }
        #prevBtn:hover:not(:disabled), #nextBtn:hover:not(:disabled) { background-color: #5a6268; }
        
        #clickBtn { background-color: #6c757d; }
        #clickBtn:hover:not(.click-active) { background-color: #5a6268; }
        #clickBtn.click-active { background-color: #007bff; }
        #clickBtn.click-active:hover { background-color: #0069d9; }

        #ttsBtn { background-color: #6c757d; }
        #ttsBtn:hover:not(.tts-active) { background-color: #5a6268; }
        #ttsBtn.tts-active { background-color: #e83e8c; }
        #ttsBtn.tts-active:hover { background-color: #d63384; }

        #voiceSelect {
            padding: 8px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: white;
            cursor: pointer;
        }

        .display-area {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 800px;
            flex-grow: 1;
            align-items: stretch; 
            margin: 20px 0;
            gap: 20px; 
        }

        .hand-box {
            width: 45%;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            padding: 40px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .hand-title {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #666;
        }

        .hand-value {
            font-size: 4rem;
            font-weight: bold;
            color: #0056b3;
        }

        .hand-next {
            font-size: 2rem;
            font-weight: normal;
            color: #ccc;
            margin-top: 15px;
            min-height: 2.5rem;
            transition: color 0.3s;
        }

        .hand-next.changed {
            color: #dc3545;
        }

        .bottom-info {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .countdown-text {
            font-size: 1.2rem;
            font-weight: bold;
            color: #555;
        }

        .progress-track {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1) inset;
        }

        .progress-fill {
            height: 100%;
            background: #0056b3;
            width: 0%;
            transition: width 0.05s linear;
            border-radius: 5px;
        }

        .counter-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            background: white;
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .counter {
            font-size: 0.95rem; 
            font-weight: bold;
            color: #555;
        }

        .mini-controls {
            display: flex;
            gap: 4px;
        }

        .mini-btn {
            padding: 2px 8px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            background-color: #e0e0e0;
            color: #555;
            border: 1px solid #ccc;
            border-radius: 4px;
            line-height: 1.2;
            min-width: 28px;
            text-align: center;
            transition: background-color 0.2s;
        }

        .mini-btn:hover:not(:disabled) {
            background-color: #d0d0d0;
        }

        .mini-btn:disabled {
            background-color: #f0f0f0;
            color: #aaa;
            cursor: not-allowed;
            border-color: #ddd;
        }

        .finger-info {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px 20px;
            font-size: 0.8rem;
            color: #888;
            margin-top: 5px;
        }
        .finger-info span b {
            color: #666;
        }

        .shortcut-hint {
            font-size: 0.85rem;
            color: #888;
            margin-top: 5px;
            text-align: center;
        }

    </style>
</head>
<body>

    <button id="exitFullscreenBtn" class="exit-fullscreen-btn">✖ Quitter</button>

    <div class="controls">
        
        <div class="file-controls">
            <button type="button" id="raccourcisBtn">Raccourcis</button>
            <button type="button" id="localisationBtn">Localisation</button>
            <label for="fileInput" class="import-btn">Importer</label>
            <input type="file" id="fileInput" accept=".txt">
            <button type="button" id="exportBtn">Exporter</button>
        </div>

        <textarea id="sequenceInput" rows="3" placeholder="Entrez vos valeurs ici (format: gauche : droite)">Le foie:
Flux de : gauche
04 g : 22 d
04 g : 14 d
04 g : 01 g
04 g : 05 g
04 g : 18 g
04 d : 18 g
Flux de : droite
22 g : 04 d
14 g : 04 d
01 d : 04 d
05 d : 04 d
18 d : 04 d
18 d : 04 g</textarea>

        <div class="input-row">
            <label>Durée :</label>
            <input type="number" id="minutesInput" value="1" min="0"> min
            <input type="number" id="secondsInput" value="0" min="0" max="59"> s
            
            <div class="loop-container">
                <input type="checkbox" id="loopCheckbox" checked>
                <label for="loopCheckbox">Boucle</label>
            </div>

            <button type="button" id="clickBtn">🔊 Clic : Off</button>
            <button type="button" id="ttsBtn">🗣 Voix : Off</button>
            <select id="voiceSelect" title="Choisir une voix"></select>
            <label>Vitesse :</label>
            <input type="number" id="speedInput" value="0.8" min="0.5" max="2" step="0.1">
            
            <label>Volume :</label>
            <input type="number" id="volumeInput" value="8" min="1" max="10">

            <div class="spacer"></div>
        </div>

        <div class="playback-controls">
            <button type="button" id="fullscreenBtn">Plein Écran</button>
            <button type="button" id="startBtn">▶ Démarrer</button>
            <button type="button" id="pauseBtn" disabled>⏸ Pause</button>
            <button type="button" id="prevBtn" disabled>⏮ Précédent</button>
            <button type="button" id="nextBtn" disabled>Suivant ⏭</button>
        </div>
    </div>

    <div class="display-area">
        <div class="hand-box">
            <div class="hand-title">Main gauche</div>
            <div class="hand-value" id="gaucheText">-</div>
            <div class="hand-next" id="gaucheNext">-</div>
        </div>

        <div class="hand-box">
            <div class="hand-title">Main droite</div>
            <div class="hand-value" id="droiteText">-</div>
            <div class="hand-next" id="droiteNext">-</div>
        </div>
    </div>

    <div class="bottom-info">
        <div class="countdown-text">Prochain changement dans : <span id="countdownVal">1:00</span></div>
        <div class="progress-track">
            <div class="progress-fill" id="progressBar"></div>
        </div>
        
        <div class="counter-wrapper">
            <div class="counter">
                <span id="stepCounter">0</span> / <span id="totalCounter">0</span>
            </div>
            <div class="mini-controls">
                <button type="button" id="miniStartBtn" class="mini-btn">▶▶</button>
                <button type="button" id="miniPauseBtn" class="mini-btn" disabled>⏸</button>
                <button type="button" id="miniPrevBtn" class="mini-btn" disabled>⏮</button>
                <button type="button" id="miniNextBtn" class="mini-btn" disabled>⏭</button>
            </div>
        </div>

        <div class="finger-info">
            <span><b>Pouce :</b> 1 16 9 19 21</span>
            <span><b>Index :</b> 5 6 10 11 22</span>
            <span><b>Majeur :</b> 6 25 3 12 13</span>
            <span><b>Annulaire :</b> 7 2 17 4 14</span>
            <span><b>Auriculaire :</b> 24 23 18 20 15</span>
        </div>

        <div class="shortcut-hint">Astuce : <b>Espace</b> = Pause/Continuer | <b>Flèches ←/→</b> = Précédent/Suivant | <b>Échap</b> = Quitter Plein écran</div>
    </div>

    <script>
        let sequence = [];
        let currentIndex = 0;
        let intervalId = null;
        
        let intervalTime = 60; 
        let lastUpdateTime = 0;
        const tickRate = 50;
        
        let audioContext = null;
        let clickWarningPlayed = false;
        
        let enableClick = false;
        let enableTTS = false;
        let previousStep = null;
        let availableVoices = [];
        
        let savedElapsed = 0;

        const gaucheText = document.getElementById('gaucheText');
        const droiteText = document.getElementById('droiteText');
        const gaucheNext = document.getElementById('gaucheNext');
        const droiteNext = document.getElementById('droiteNext');
        
        const stepCounter = document.getElementById('stepCounter');
        const totalCounter = document.getElementById('totalCounter');
        const minutesInput = document.getElementById('minutesInput');
        const secondsInput = document.getElementById('secondsInput');
        const volumeInput = document.getElementById('volumeInput');
        const loopCheckbox = document.getElementById('loopCheckbox');
        
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const sequenceInput = document.getElementById('sequenceInput');
        const countdownVal = document.getElementById('countdownVal');
        const progressBar = document.getElementById('progressBar');
        const fileInput = document.getElementById('fileInput');
        const exportBtn = document.getElementById('exportBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const exitFullscreenBtn = document.getElementById('exitFullscreenBtn');
        
        const clickBtn = document.getElementById('clickBtn');
        const ttsBtn = document.getElementById('ttsBtn');
        const voiceSelect = document.getElementById('voiceSelect');
        const speedInput = document.getElementById('speedInput');
        
        const raccourcisBtn = document.getElementById('raccourcisBtn');
        const localisationBtn = document.getElementById('localisationBtn');
        
        const miniPrevBtn = document.getElementById('miniPrevBtn');
        const miniStartBtn = document.getElementById('miniStartBtn');
        const miniPauseBtn = document.getElementById('miniPauseBtn');
        const miniNextBtn = document.getElementById('miniNextBtn');

        // ==========================================
        // FONCTIONS DE PARSE ET MAJ COMPTEUR
        // ==========================================
        
        function cleanForDisplay(val) {
            let cleaned = val.replace(/\s+/g, ' ').trim();
            return cleaned || '-';
        }

        function isValueZero(val) {
            const match = val.match(/\d+/);
            return match ? parseInt(match[0], 10) === 0 : false;
        }

        function parseSequenceInput(text) {
            const lines = text.trim().split('\n');
            const parsedSeq = [];
            for (let line of lines) {
                let trimmedLine = line.trim();
                if (trimmedLine === '') continue; 
                
                // Ignorer les lignes commençant par *
                if (trimmedLine.startsWith('*')) continue;
                
                const parts = line.split(':');
                if (parts.length === 2) {
                    let gauche = parts[0].trim();
                    let droite = parts[1].trim();
                    
                    if (gauche !== '' || droite !== '') {
                        parsedSeq.push({
                            gauche: gauche || '-',
                            droite: droite || '-'
                        });
                    }
                }
            }
            return parsedSeq;
        }

        function updateTotalCounter() {
            const parsedSeq = parseSequenceInput(sequenceInput.value);
            totalCounter.textContent = parsedSeq.length;
        }

        // ==========================================
        // BOUTONS CLIC ET VOIX
        // ==========================================
        clickBtn.addEventListener('click', () => {
            enableClick = !enableClick;
            clickBtn.textContent = enableClick ? "🔊 Clic : On" : "🔊 Clic : Off";
            clickBtn.classList.toggle('click-active', enableClick);
            saveSettings();
        });

        ttsBtn.addEventListener('click', () => {
            enableTTS = !enableTTS;
            ttsBtn.textContent = enableTTS ? "🗣 Voix : On" : "🗣 Voix : Off";
            ttsBtn.classList.toggle('tts-active', enableTTS);
            if (!enableTTS && window.speechSynthesis) {
                window.speechSynthesis.cancel(); 
            }
            saveSettings();
        });

        // ==========================================
        // GESTION DES VOIX TTS
        // ==========================================
        function loadVoices() {
            if (!window.speechSynthesis) return;
            const allVoices = window.speechSynthesis.getVoices();
            voiceSelect.innerHTML = ''; 
            
            availableVoices = allVoices.filter(v => v.lang && v.lang.toLowerCase().startsWith('fr'));

            if (availableVoices.length === 0) {
                const option = document.createElement('option');
                option.textContent = "Aucune voix FR trouvée";
                option.disabled = true;
                voiceSelect.appendChild(option);
                return;
            }

            availableVoices.forEach((voice, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = `${voice.name} (${voice.lang})`;
                if (voice.default) option.selected = true;
                voiceSelect.appendChild(option);
            });

            const saved = localStorage.getItem('mainsGD_settings');
            if (saved) {
                const settings = JSON.parse(saved);
                if (settings.voiceIndex !== undefined && voiceSelect.options[settings.voiceIndex]) {
                    voiceSelect.value = settings.voiceIndex;
                }
            }
        }

        if (window.speechSynthesis) {
            loadVoices();
            window.speechSynthesis.onvoiceschanged = loadVoices;
        }

        voiceSelect.addEventListener('change', saveSettings);
        speedInput.addEventListener('input', saveSettings);
        volumeInput.addEventListener('input', saveSettings);

        function speakTexts(texts) {
            if (!window.speechSynthesis || !enableTTS) return;
            window.speechSynthesis.cancel(); 
            
            const selectedVoiceIndex = voiceSelect.value;
            const selectedVoice = availableVoices[selectedVoiceIndex];
            const currentSpeed = parseFloat(speedInput.value) || 0.8;
            const currentVolume = (parseInt(volumeInput.value) || 8) / 10; // Volume 1-10 converti en 0.1-1.0

            texts.forEach(t => {
                const utterance = new SpeechSynthesisUtterance(t);
                if (selectedVoice) {
                    utterance.voice = selectedVoice;
                    utterance.lang = selectedVoice.lang;
                } else {
                    utterance.lang = 'fr-FR';
                }
                utterance.rate = currentSpeed; 
                utterance.volume = currentVolume; // Applique le volume
                window.speechSynthesis.speak(utterance);
            });
        }

        function formatSpokenValue(val) {
            let cleanedVal = val.replace(/\b0(\d)\b/i, '$1');
            cleanedVal = cleanedVal.replace(/\s+/g, ' ').trim();

            const match = cleanedVal.match(/\d+/);
            let fingerName = "";

            if (match) {
                const num = parseInt(match[0], 10);
                
                if ([1, 16, 9, 19, 21].includes(num)) {
                    fingerName = "Pouce";
                } else if ([5, 6, 10, 11, 22].includes(num)) {
                    fingerName = "Index";
                } else if ([6, 25, 3, 12, 13].includes(num)) { 
                    fingerName = "Majeur";
                } else if ([7, 2, 17, 4, 14].includes(num)) {
                    fingerName = "Annulaire";
                } else if ([24, 23, 18, 20, 15].includes(num)) {
                    fingerName = "Auriculaire";
                }
            }

            cleanedVal = cleanedVal.replace(/\bg\b/i, 'gauche').replace(/\bd\b/i, 'droit');

            if (fingerName) {
                return `${cleanedVal}, raccourci ${fingerName}`;
            } else {
                return cleanedVal;
            }
        }

        // Vérifie si une étape ne contient aucun chiffre NI point "." 
        function isTextOnlyStep(step) {
            if (!step) return false;
            let gClean = step.gauche.trim();
            let dClean = step.droite.trim();
            
            let leftHasDigitOrDot = /(\d|\.)/.test(gClean);
            let rightHasDigitOrDot = /(\d|\.)/.test(dClean);
            
            return !leftHasDigitOrDot && !rightHasDigitOrDot;
        }

        function getVoiceTexts(oldStep, newStep) {
            let textsToSpeak = [];
            if (!oldStep || !newStep) return textsToSpeak;

            let leftChanged = newStep.gauche !== oldStep.gauche;
            let rightChanged = newStep.droite !== oldStep.droite;

            if (!leftChanged && !rightChanged) return textsToSpeak;

            let leftHasDigitOrDot = /(\d|\.)/.test(newStep.gauche);
            let rightHasDigitOrDot = /(\d|\.)/.test(newStep.droite);

            if (!leftHasDigitOrDot && !rightHasDigitOrDot) {
                if (leftChanged || rightChanged) {
                    let textToRead = `${newStep.gauche.trim()} ${newStep.droite.trim()}`.replace(/\s+/g, ' ').trim();
                    if(textToRead) textsToSpeak.push(textToRead);
                }
                return textsToSpeak;
            }

            if (leftChanged && !isValueZero(newStep.gauche)) {
                textsToSpeak.push("Main gauche, " + formatSpokenValue(newStep.gauche));
            }
            if (rightChanged && !isValueZero(newStep.droite)) {
                textsToSpeak.push("Main droite, " + formatSpokenValue(newStep.droite));
            }

            return textsToSpeak;
        }

        // ==========================================
        // 1. SCRIPT DE SAUVEGARDE (LocalStorage)
        // ==========================================
        
        const defaultSequenceText = `Le foie\nFlux de : gauche\n04 g : 22 d\n04 g : 14 d\n04 g : 01 g\n04 g : 05 g\n04 g : 18 g\n04 d : 18 g\nFlux de : droite\n22 g : 04 d\n14 g : 04 d\n01 d : 04 d\n05 d : 04 d\n18 d : 04 d\n18 d : 04 g`;

        function saveSettings() {
            const settings = {
                sequence: sequenceInput.value,
                minutes: minutesInput.value,
                seconds: secondsInput.value,
                volume: volumeInput.value,
                loop: loopCheckbox.checked,
                click: enableClick,
                tts: enableTTS,
                voiceIndex: voiceSelect.value,
                speed: speedInput.value
            };
            localStorage.setItem('mainsGD_settings', JSON.stringify(settings));
        }

        function loadSettings() {
            const saved = localStorage.getItem('mainsGD_settings');
            if (saved) {
                const settings = JSON.parse(saved);
                sequenceInput.value = settings.sequence || defaultSequenceText;
                minutesInput.value = settings.minutes !== undefined ? settings.minutes : 1;
                secondsInput.value = settings.seconds !== undefined ? settings.seconds : 0;
                volumeInput.value = settings.volume !== undefined ? settings.volume : 8;
                loopCheckbox.checked = settings.loop !== undefined ? settings.loop : true;
                
                enableClick = settings.click || false;
                clickBtn.textContent = enableClick ? "🔊 Clic : On" : "🔊 Clic : Off";
                clickBtn.classList.toggle('click-active', enableClick);

                enableTTS = settings.tts || false;
                ttsBtn.textContent = enableTTS ? "🗣 Voix : On" : "🗣 Voix : Off";
                ttsBtn.classList.toggle('tts-active', enableTTS);
                
                speedInput.value = settings.speed !== undefined ? settings.speed : 0.8;
            } else {
                sequenceInput.value = defaultSequenceText;
            }
        }

        sequenceInput.addEventListener('input', () => {
            saveSettings();
            updateTotalCounter();
            
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
            }
            sequence = [];
            previousStep = null;
            savedElapsed = 0; 
            setButtonStates('stopped');
            stepCounter.textContent = '0';
            countdownVal.textContent = formatTime(getIntervalSeconds() || 0);
            progressBar.style.width = '0%';
            gaucheText.textContent = '-';
            droiteText.textContent = '-';
            gaucheNext.textContent = '-';
            droiteNext.textContent = '-';
        });
        
        minutesInput.addEventListener('input', saveSettings);
        secondsInput.addEventListener('input', saveSettings);
        loopCheckbox.addEventListener('change', saveSettings);

        loadSettings();
        updateTotalCounter();

        // ==========================================
        // 2. EXPORT DE FICHIER
        // ==========================================
        exportBtn.addEventListener('click', (e) => {
            e.preventDefault(); 
            
            const textToExport = sequenceInput.value;
            const blob = new Blob([textToExport], { type: "text/plain;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'sequence_mains.txt';
            document.body.appendChild(a);
            a.click();
            
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 100);
        });

        // ==========================================
        // 3. PLEIN ÉCRAN
        // ==========================================
        function enterFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            }
        }

        function exitFullscreen() {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }

        fullscreenBtn.addEventListener('click', enterFullscreen);
        exitFullscreenBtn.addEventListener('click', exitFullscreen);

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                document.body.classList.add('fullscreen-active');
                fullscreenBtn.textContent = "Quitter Plein Écran";
            } else {
                document.body.classList.remove('fullscreen-active');
                fullscreenBtn.textContent = "Plein Écran";
            }
        });

        // ==========================================
        // AUDIO ET LOGIQUE PRINCIPALE
        // ==========================================
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }

        function playClickSound(time = 0) {
            if (!audioContext) return;
            const currentVolume = (parseInt(volumeInput.value) || 8) / 10; // Volume 1-10 converti en 0.1-1.0
            
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.frequency.value = 1500; 
            gain.gain.setValueAtTime(currentVolume, audioContext.currentTime + time);
            gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + time + 0.05);
            osc.start(audioContext.currentTime + time);
            osc.stop(audioContext.currentTime + time + 0.05);
        }

        function playClickClick() {
            if (!audioContext || !enableClick) return;
            playClickSound(0);      
            playClickSound(0.12);   
        }

        function playEndClicks() {
            if (!audioContext || !enableClick) return;
            for (let i = 0; i < 5; i++) {
                playClickSound(i * 0.5); 
            }
        }

        function getIntervalSeconds() {
            let mins = parseInt(minutesInput.value) || 0;
            let secs = parseInt(secondsInput.value) || 0;
            return mins * 60 + secs;
        }

        function formatTime(totalSeconds) {
            const m = Math.floor(totalSeconds / 60);
            const s = totalSeconds % 60;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function updateDisplay(shouldSpeak = true) {
            if (sequence.length === 0) return;
            const step = sequence[currentIndex];
            
            if (isTextOnlyStep(step)) {
                if (enableTTS) {
                    let textToRead = `${step.gauche.trim()} ${step.droite.trim()}`.replace(/\s+/g, ' ').trim();
                    if(textToRead) speakTexts([textToRead]);
                }
            } else if (shouldSpeak && enableTTS && previousStep) {
                let textsToSpeak = getVoiceTexts(previousStep, step);
                if (textsToSpeak.length > 0) {
                    speakTexts(textsToSpeak);
                }
            }
            previousStep = step; 

            gaucheText.textContent = cleanForDisplay(step.gauche);
            droiteText.textContent = cleanForDisplay(step.droite);
            stepCounter.textContent = (currentIndex + 1);
            
            let nextIndex = (currentIndex + 1) % sequence.length;
            
            if (!loopCheckbox.checked && currentIndex === sequence.length - 1) {
                gaucheNext.textContent = "FIN";
                droiteNext.textContent = "FIN";
                gaucheNext.classList.remove('changed');
                droiteNext.classList.remove('changed');
            } else {
                const nextStep = sequence[nextIndex];
                const dispGauche = cleanForDisplay(step.gauche);
                const dispDroite = cleanForDisplay(step.droite);
                const dispNextGauche = cleanForDisplay(nextStep.gauche);
                const dispNextDroite = cleanForDisplay(nextStep.droite);
                
                gaucheNext.textContent = dispNextGauche;
                droiteNext.textContent = dispNextDroite;
                
                if (dispNextGauche !== dispGauche) gaucheNext.classList.add('changed');
                else gaucheNext.classList.remove('changed');

                if (dispNextDroite !== dispDroite) droiteNext.classList.add('changed');
                else droiteNext.classList.remove('changed');
            }
            clickWarningPlayed = false;
        }

        function tick() {
            const now = Date.now();
            const elapsed = (now - lastUpdateTime) / 1000;
            
            const currentStep = sequence[currentIndex];
            
            if (isTextOnlyStep(currentStep)) {
                intervalTime = 4; 
            } else {
                let currentInputTime = getIntervalSeconds();
                if (!isNaN(currentInputTime) && currentInputTime > 0) {
                    intervalTime = currentInputTime;
                }
            }

            const remaining = Math.max(0, intervalTime - elapsed);
            countdownVal.textContent = formatTime(Math.ceil(remaining));
            const progressPercent = (elapsed / intervalTime) * 100;
            progressBar.style.width = Math.min(100, progressPercent) + '%';

            const warningTime = intervalTime > 5 ? 5.0 : Math.max(0.5, intervalTime / 2);

            if (remaining <= warningTime && remaining > 0 && !clickWarningPlayed) {
                if (enableClick) {
                    playClickClick();
                }
                clickWarningPlayed = true;
                
                if (enableTTS && sequence.length > 0) {
                    const nextIdx = (currentIndex + 1) % sequence.length;
                    const nextStep = sequence[nextIdx];
                    
                    if (!loopCheckbox.checked && currentIndex === sequence.length - 1) {
                        // Fin de la séquence
                    } else {
                        if (!isTextOnlyStep(nextStep)) {
                            let textsToSpeak = getVoiceTexts(currentStep, nextStep);
                            if (textsToSpeak.length > 0) {
                                speakTexts(textsToSpeak);
                            }
                        }
                    }
                }
            }

            if (elapsed >= intervalTime) {
                if (!loopCheckbox.checked && currentIndex === sequence.length - 1) {
                    clearInterval(intervalId);
                    intervalId = null;
                    setButtonStates('stopped');
                    playEndClicks(); 
                    return;
                }

                currentIndex = (currentIndex + 1) % sequence.length;
                updateDisplay(false); 
                lastUpdateTime = Date.now();
            }
        }

        function setButtonStates(state) {
            if (state === 'playing') {
                startBtn.disabled = false; 
                pauseBtn.disabled = false; 
                pauseBtn.textContent = "⏸ Pause"; 
                miniPauseBtn.textContent = "⏸";
                miniPauseBtn.disabled = false;
                
                prevBtn.disabled = false;
                nextBtn.disabled = false;
                miniPrevBtn.disabled = false;
                miniStartBtn.disabled = false; 
                miniNextBtn.disabled = false;
            } else if (state === 'paused') {
                startBtn.disabled = false; 
                pauseBtn.disabled = false; 
                pauseBtn.textContent = "⏵ Continuer"; 
                miniPauseBtn.textContent = "▶";
                miniPauseBtn.disabled = false;
                
                prevBtn.disabled = false;
                nextBtn.disabled = false;
                miniPrevBtn.disabled = false;
                miniStartBtn.disabled = false;
                miniNextBtn.disabled = false;
            } else if (state === 'stopped') {
                startBtn.disabled = false;
                pauseBtn.disabled = true;
                pauseBtn.textContent = "⏸ Pause";
                miniPauseBtn.textContent = "⏸";
                miniPauseBtn.disabled = true;
                
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                miniPrevBtn.disabled = true;
                miniStartBtn.disabled = false;
                miniNextBtn.disabled = true;
            } else {
                startBtn.disabled = false;
                pauseBtn.disabled = true;
                pauseBtn.textContent = "⏸ Pause";
                miniPauseBtn.textContent = "⏸";
                miniPauseBtn.disabled = true;
                
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                miniPrevBtn.disabled = true;
                miniStartBtn.disabled = false;
                miniNextBtn.disabled = true;
            }
        }

        function startAnimation() {
            initAudio();
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
            }
            
            sequence = parseSequenceInput(sequenceInput.value);
            
            if (sequence.length === 0) {
                alert("Veuillez entrer une séquence valide (format: gauche : droite).");
                return;
            }
            totalCounter.textContent = sequence.length;
            currentIndex = 0; 
            previousStep = null; 
            savedElapsed = 0; 
            
            if (isTextOnlyStep(sequence[currentIndex])) {
                intervalTime = 4;
            } else {
                intervalTime = getIntervalSeconds();
            }
            
            if (isNaN(intervalTime) || intervalTime <= 0) {
                alert("Veuillez entrer un temps valide (supérieur à 0).");
                return;
            }
            
            updateDisplay(false); 
            lastUpdateTime = Date.now();
            intervalId = setInterval(tick, tickRate);
            setButtonStates('playing');
        }

        function pauseAnimation() {
            if (intervalId) {
                savedElapsed = (Date.now() - lastUpdateTime) / 1000;
                
                clearInterval(intervalId);
                intervalId = null;
                setButtonStates('paused');
            }
        }

        function continueAnimation() {
            if (!intervalId && sequence.length > 0) {
                initAudio();
                if (isTextOnlyStep(sequence[currentIndex])) {
                    intervalTime = 4;
                } else {
                    intervalTime = getIntervalSeconds(); 
                }
                
                if (isNaN(intervalTime) || intervalTime <= 0) {
                    alert("Veuillez entrer un temps valide (supérieur à 0).");
                    return;
                }
                
                lastUpdateTime = Date.now() - (savedElapsed * 1000);
                
                intervalId = setInterval(tick, tickRate);
                setButtonStates('playing');
            }
        }

        function togglePauseContinue() {
            if (intervalId) {
                pauseAnimation();
            } else if (sequence.length > 0) {
                continueAnimation();
            }
        }

        function stepBack() {
            if (sequence.length === 0) return;
            initAudio();
            if (enableClick) playClickClick(); 
            currentIndex = (currentIndex - 1 + sequence.length) % sequence.length;
            savedElapsed = 0; 
            updateDisplay(); 
            lastUpdateTime = Date.now();
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = setInterval(tick, tickRate);
            }
        }

        function stepForward() {
            if (sequence.length === 0) return;
            initAudio();
            if (enableClick) playClickClick(); 
            currentIndex = (currentIndex + 1) % sequence.length;
            savedElapsed = 0; 
            updateDisplay(); 
            lastUpdateTime = Date.now();
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = setInterval(tick, tickRate);
            }
        }

        startBtn.addEventListener('click', startAnimation);
        
        pauseBtn.addEventListener('click', togglePauseContinue);
        miniPauseBtn.addEventListener('click', togglePauseContinue);
        
        prevBtn.addEventListener('click', stepBack);
        nextBtn.addEventListener('click', stepForward);
        
        miniPrevBtn.addEventListener('click', stepBack);
        miniStartBtn.addEventListener('click', startAnimation);
        miniNextBtn.addEventListener('click', stepForward);

        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    sequenceInput.value = e.target.result;
                    saveSettings();
                    updateTotalCounter();
                    location.reload(); 
                };
                reader.readAsText(file);
            }
        });

        raccourcisBtn.addEventListener('click', () => window.open('JSJ_MAIN.html', '_blank'));
        localisationBtn.addEventListener('click', () => window.open('jsj_26_verrous.html', '_blank'));

        // ==========================================
        // 4. RACCOURCIS CLAVIER
        // ==========================================
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') {
                return;
            }

            if (e.code === 'Space') {
                e.preventDefault();
                if (document.activeElement && document.activeElement.tagName === 'BUTTON') {
                    document.activeElement.blur();
                }
                
                if (intervalId) {
                    pauseAnimation();
                } else if (sequence.length > 0) {
                    continueAnimation();
                } else {
                    startAnimation();
                }
            }
            else if (e.code === 'ArrowLeft') {
                e.preventDefault();
                if (!prevBtn.disabled) stepBack();
            }
            else if (e.code === 'ArrowRight') {
                e.preventDefault();
                if (!nextBtn.disabled) stepForward();
            }
            else if (e.code === 'Escape') {
                if (document.fullscreenElement) {
                    exitFullscreen();
                }
            }
        });
    </script>
</body>
</html>
