<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecture de texte</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { outfit: ['Outfit', 'sans-serif'] },
                    colors: { accent: { DEFAULT: '#059669', dark: '#047857', light: '#D1FAE5' } }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Outfit', sans-serif; }

        textarea::-webkit-scrollbar, #reading-view::-webkit-scrollbar { width: 6px; }
        textarea::-webkit-scrollbar-track, #reading-view::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 3px; }
        textarea::-webkit-scrollbar-thumb, #reading-view::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        textarea::-webkit-scrollbar-thumb:hover, #reading-view::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        input[type="range"] { -webkit-appearance: none; appearance: none; height: 6px; background: #e2e8f0; border-radius: 3px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; background: #059669; border-radius: 50%; cursor: pointer; box-shadow: 0 2px 8px rgba(5,150,105,0.35); transition: transform 0.15s ease; }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.18); }
        input[type="range"]::-moz-range-thumb { width: 22px; height: 22px; background: #059669; border-radius: 50%; cursor: pointer; border: none; box-shadow: 0 2px 8px rgba(5,150,105,0.35); }

        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 0 0 rgba(5,150,105,0.45); } 50% { box-shadow: 0 0 0 10px rgba(5,150,105,0); } }
        .reading-active { animation: pulseGlow 2s ease-in-out infinite; }

        .progress-fill { transition: width 0.35s ease; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .fade-up { animation: fadeUp 0.5s ease forwards; }
        .fd1 { animation-delay: 0.05s; opacity: 0; }
        .fd2 { animation-delay: 0.12s; opacity: 0; }
        .fd3 { animation-delay: 0.2s; opacity: 0; }
        .fd4 { animation-delay: 0.28s; opacity: 0; }
        .fd5 { animation-delay: 0.36s; opacity: 0; }

        @keyframes slideIn { from { transform: translateX(110%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(110%); opacity: 0; } }
        .toast-in { animation: slideIn 0.35s ease forwards; }
        .toast-out { animation: slideOut 0.3s ease forwards; }

        .btn-ctrl { transition: all 0.2s ease; }
        .btn-ctrl:hover { transform: translateY(-1px); }
        .btn-ctrl:active { transform: translateY(0); }

        /* Surbrillance du texte lu */
        .word { transition: background-color 0.15s ease, color 0.15s ease; border-radius: 3px; padding: 1px 0; }
        .reading-highlight { background-color: #059669; color: #ffffff; }

        /* Zone de lecture (similaire à textarea) */
        #reading-view {
            font-size: 1rem;
            line-height: 1.625;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-y: auto;
        }

        body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(circle at 1px 1px, rgba(0,0,0,0.03) 1px, transparent 0); background-size: 28px 28px; pointer-events: none; z-index: 0; }

        .custom-select {
            background-image: url("data:image/svg+xml,%3Csvg fill='%236B7280' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z'/%3E%3C/svg%3E");
            background-repeat: no-repeat; background-position: right 14px center; background-size: 18px;
        }

        @keyframes blink { 0%,100%{ opacity:1; } 50%{ opacity:0.3; } }
        .live-dot { animation: blink 1.2s ease-in-out infinite; }
    </style>
</head>
<body class="bg-white min-h-screen text-gray-900">

    <div class="relative z-10 max-w-2xl mx-auto px-4 sm:px-6 py-8 sm:py-14">

        <!-- Titre -->
        <header class="fade-up fd1 mb-10 text-center">
            <div class="inline-flex items-center gap-3 mb-1">
                <div class="w-11 h-11 rounded-xl bg-accent/10 flex items-center justify-center">
                    <i class="fa-solid fa-book-open text-accent text-lg"></i>
                </div>
                <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight text-gray-900">Lecture de texte</h1>
            </div>
            <p class="text-gray-400 text-sm mt-2 font-medium">Synthese vocale avec surbrillance</p>
        </header>

        <!-- Zone de texte / Lecture -->
        <section class="fade-up fd2 mb-5">
            <label for="text-input" class="flex items-center gap-1.5 text-sm font-semibold text-gray-700 mb-2">
                <i class="fa-solid fa-pen-nib text-accent text-xs"></i>
                Texte à lire
            </label>
            <!-- Conteneur avec position relative pour superposer la vue lecture -->
            <div class="relative">
                <textarea
                    id="text-input"
                    rows="7"
                    class="w-full p-4 bg-white border-2 border-gray-200 rounded-xl text-gray-800 text-base leading-relaxed resize-none focus:outline-none focus:border-accent focus:ring-2 focus:ring-accent/20 transition-all duration-200 placeholder:text-gray-300"
                    placeholder="Saisissez ou collez votre texte ici..."
                ></textarea>
                <!-- Vue de lecture superposée (cachée par défaut) -->
                <div id="reading-view" class="hidden absolute inset-0 p-4 bg-white border-2 border-accent rounded-xl text-gray-800 focus:outline-none transition-all duration-200"></div>
                
                <!-- Indicateur live -->
                <div id="live-badge" class="hidden absolute top-3 right-3 flex items-center gap-1.5 bg-accent/10 text-accent text-xs font-bold px-2.5 py-1 rounded-full z-10">
                    <span class="live-dot w-1.5 h-1.5 rounded-full bg-accent inline-block"></span>
                    Lecture
                </div>
            </div>
            <div class="flex justify-between mt-1.5 text-xs text-gray-400 font-medium">
                <span id="word-count">0 mot</span>
                <span id="char-count">0 caractere</span>
            </div>
        </section>

        <!-- Barre de progression -->
        <section class="fade-up fd2 mb-6">
            <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
                <div id="progress-bar" class="progress-fill h-full bg-gradient-to-r from-accent to-emerald-400 rounded-full" style="width:0%"></div>
            </div>
            <div class="flex justify-between items-center mt-1.5">
                <span id="progress-text" class="text-xs text-gray-400 font-medium">0%</span>
                <span id="time-remaining" class="text-xs font-semibold text-gray-600">
                    <i class="fa-regular fa-clock mr-1 text-accent"></i>Temps restant : --:--
                </span>
            </div>
        </section>

        <!-- Contrôles de lecture -->
        <section class="fade-up fd3 mb-7">
            <div class="flex items-center justify-center gap-3 sm:gap-4">
                <button id="btn-start" class="btn-ctrl flex items-center gap-2 px-6 py-3 bg-accent text-white font-semibold rounded-xl hover:bg-accent-dark shadow-md shadow-accent/20 text-sm">
                    <i class="fa-solid fa-play text-xs"></i>
                    <span>Demarrer</span>
                </button>
                <button id="btn-pause" class="btn-ctrl flex items-center gap-2 px-5 py-3 bg-gray-100 text-gray-700 font-semibold rounded-xl hover:bg-gray-200 disabled:opacity-35 disabled:cursor-not-allowed text-sm" disabled>
                    <i class="fa-solid fa-pause text-xs" id="pause-icon"></i>
                    <span id="pause-label">Pause</span>
                </button>
                <button id="btn-stop" class="btn-ctrl flex items-center gap-2 px-5 py-3 bg-gray-100 text-gray-700 font-semibold rounded-xl hover:bg-gray-200 disabled:opacity-35 disabled:cursor-not-allowed text-sm" disabled>
                    <i class="fa-solid fa-stop text-xs"></i>
                    <span>Stop</span>
                </button>
            </div>
        </section>

        <!-- Voix française -->
        <section class="fade-up fd4 mb-5">
            <label for="voice-select" class="flex items-center gap-1.5 text-sm font-semibold text-gray-700 mb-2">
                <i class="fa-solid fa-microphone text-accent text-xs"></i>
                Voix francaise (France)
            </label>
            <select id="voice-select" class="custom-select w-full p-3 pr-10 bg-white border-2 border-gray-200 rounded-xl text-gray-800 focus:outline-none focus:border-accent focus:ring-2 focus:ring-accent/20 transition-all duration-200 cursor-pointer appearance-none">
                <option>Chargement des voix...</option>
            </select>
        </section>

        <!-- Vitesse de lecture -->
        <section class="fade-up fd4 mb-7">
            <div class="flex items-center justify-between mb-2">
                <label for="speed-range" class="flex items-center gap-1.5 text-sm font-semibold text-gray-700">
                    <i class="fa-solid fa-gauge-high text-accent text-xs"></i>
                    Vitesse de lecture
                </label>
                <span id="speed-value" class="text-sm font-bold text-accent bg-accent/10 px-3 py-0.5 rounded-lg">1.0x</span>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-xs text-gray-400 font-medium w-8 text-center">0.5x</span>
                <input type="range" id="speed-range" min="0.5" max="2" step="0.1" value="1" class="flex-1">
                <span class="text-xs text-gray-400 font-medium w-8 text-center">2.0x</span>
            </div>
        </section>

        <!-- Séparateur -->
        <hr class="border-gray-100 mb-7">

        <!-- Boutons utilitaires -->
        <section class="fade-up fd5">
            <div class="flex flex-wrap items-center justify-center gap-3">
                <button id="btn-save" class="btn-ctrl flex items-center gap-2 px-4 py-2.5 bg-white border-2 border-gray-200 text-gray-700 font-medium rounded-xl hover:bg-gray-50 hover:border-gray-300 text-sm">
                    <i class="fa-solid fa-floppy-disk text-xs text-accent"></i>
                    <span>Sauvegarde des parametres</span>
                </button>
                <button id="btn-import" class="btn-ctrl flex items-center gap-2 px-4 py-2.5 bg-white border-2 border-gray-200 text-gray-700 font-medium rounded-xl hover:bg-gray-50 hover:border-gray-300 text-sm">
                    <i class="fa-solid fa-file-import text-xs text-accent"></i>
                    <span>Importer texte</span>
                </button>
                <button id="btn-export" class="btn-ctrl flex items-center gap-2 px-4 py-2.5 bg-white border-2 border-gray-200 text-gray-700 font-medium rounded-xl hover:bg-gray-50 hover:border-gray-300 text-sm">
                    <i class="fa-solid fa-file-export text-xs text-accent"></i>
                    <span>Exporter texte</span>
                </button>
            </div>
        </section>

        <!-- Input caché pour import fichier -->
        <input type="file" id="file-input" accept=".txt,.md,.text" class="hidden">

    </div>

    <!-- Container toasts -->
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <script>
        // === Références DOM ===
        const textInput     = document.getElementById('text-input');
        const readingView   = document.getElementById('reading-view');
        const wordCountEl   = document.getElementById('word-count');
        const charCountEl   = document.getElementById('char-count');
        const progressBar   = document.getElementById('progress-bar');
        const progressText  = document.getElementById('progress-text');
        const timeRemaining = document.getElementById('time-remaining');
        const liveBadge     = document.getElementById('live-badge');
        const btnStart      = document.getElementById('btn-start');
        const btnPause      = document.getElementById('btn-pause');
        const btnStop       = document.getElementById('btn-stop');
        const pauseIcon     = document.getElementById('pause-icon');
        const pauseLabel    = document.getElementById('pause-label');
        const voiceSelect   = document.getElementById('voice-select');
        const speedRange    = document.getElementById('speed-range');
        const speedValue    = document.getElementById('speed-value');
        const btnSave       = document.getElementById('btn-save');
        const btnImport     = document.getElementById('btn-import');
        const btnExport     = document.getElementById('btn-export');
        const fileInput     = document.getElementById('file-input');

        // === État global ===
        const synth = window.speechSynthesis;
        let currentUtterance  = null;
        let isReading         = false;
        let isPaused          = false;
        let currentCharIndex  = 0;
        let charOffset        = 0;
        let totalChars        = 0;
        let voices            = [];
        let selectedVoice     = null;
        let currentRate       = 1.0;
        let updateTimer       = null;
        let keepAliveTimer    = null;

        // === Utilitaires ===
        function countWords(text) { return text.trim() ? text.trim().split(/\s+/).length : 0; }
        function estimateTime(text, rate) { const words = countWords(text); const wpm = 180 * Math.max(0.1, rate); return (words / wpm) * 60; }
        function formatTime(sec) { if (!sec || sec <= 0 || !isFinite(sec)) return '--:--'; const m = Math.floor(sec / 60); const s = Math.floor(sec % 60); return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`; }

        function showToast(msg, type = 'success') {
            const container = document.getElementById('toast-container');
            const el = document.createElement('div');
            const palette = { success: 'bg-accent text-white', error: 'bg-red-500 text-white', info: 'bg-gray-800 text-white' };
            const icons   = { success: 'fa-circle-check', error: 'fa-circle-xmark', info: 'fa-circle-info' };
            el.className = `${palette[type]} px-4 py-3 rounded-xl shadow-lg flex items-center gap-2 text-sm font-medium toast-in pointer-events-auto`;
            el.innerHTML = `<i class="fa-solid ${icons[type]}"></i><span>${msg}</span>`;
            container.appendChild(el);
            setTimeout(() => { el.classList.replace('toast-in', 'toast-out'); setTimeout(() => el.remove(), 300); }, 2800);
        }

        // === Bascule Édition / Lecture ===
        function toggleEditMode(isEdit) {
            if (isEdit) {
                textInput.classList.remove('hidden');
                readingView.classList.add('hidden');
            } else {
                textInput.classList.add('hidden');
                readingView.classList.remove('hidden');
            }
        }

        /** Prépare la vue de lecture avec des spans pour chaque mot */
        function prepareReadingView(text) {
            const parts = text.split(/(\s+)/); // Conserve les espaces et retours à la ligne
            let html = '';
            let charPos = 0;
            for (const part of parts) {
                if (part.length === 0) continue;
                if (/\s/.test(part)) {
                    // Espaces et retours à la ligne tels quels
                    html += part;
                } else {
                    // Encapsule les mots dans des spans avec leur position
                    html += `<span class="word" data-start="${charPos}">${part}</span>`;
                }
                charPos += part.length;
            }
            readingView.innerHTML = html;
        }

        // === Compteurs texte ===
        function updateCounts() {
            const txt = textInput.value;
            const w = countWords(txt);
            const c = txt.length;
            wordCountEl.textContent = `${w} mot${w > 1 ? 's' : ''}`;
            charCountEl.textContent = `${c} caractere${c > 1 ? 's' : ''}`;
            if (!isReading) {
                const t = estimateTime(txt, currentRate);
                timeRemaining.innerHTML = `<i class="fa-regular fa-clock mr-1 text-accent"></i>Temps restant : ${formatTime(t)}`;
            }
        }

        // === Chargement des voix (Uniquement fr-FR) ===
        function loadVoices() {
            voices = synth.getVoices();
            // Filtrage strict : uniquement "fr" ou "fr-FR" (exclut fr-CA, fr-BE, fr-CH...)
            const french = voices.filter(v => v.lang === 'fr' || v.lang === 'fr-FR');

            voiceSelect.innerHTML = '';

            if (french.length === 0 && voices.length === 0) {
                voiceSelect.innerHTML = '<option>Chargement des voix...</option>';
                return;
            }

            if (french.length === 0 && voices.length > 0) {
                const opt = document.createElement('option');
                opt.disabled = true;
                opt.textContent = 'Aucune voix fr-FR trouvée';
                voiceSelect.appendChild(opt);
                
                voices.forEach(voice => {
                    const o = document.createElement('option');
                    o.value = voices.indexOf(voice);
                    o.textContent = `${voice.name} — ${voice.lang}`;
                    voiceSelect.appendChild(o);
                });
                selectedVoice = voices[0] || null;
            } else {
                french.forEach(voice => {
                    const opt = document.createElement('option');
                    opt.value = voices.indexOf(voice);
                    opt.textContent = `${voice.name} — ${voice.lang}`;
                    voiceSelect.appendChild(opt);
                });
                selectedVoice = french[0];
            }

            // Restaurer la voix sauvegardée
            const saved = localStorage.getItem('lecture-texte-params');
            if (saved) {
                try {
                    const p = JSON.parse(saved);
                    if (p.voiceIndex !== undefined && voices[p.voiceIndex]) {
                        voiceSelect.value = p.voiceIndex;
                        selectedVoice = voices[p.voiceIndex];
                    }
                } catch(e) {}
            }
        }

        if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;
        loadVoices();

        // === Lecture ===
        function startReading(fromBeginning = true) {
            const text = textInput.value.trim();
            if (!text) { showToast('Veuillez saisir du texte a lire.', 'error'); return; }

            synth.cancel();
            stopTimers();

            if (fromBeginning) currentCharIndex = 0;

            const textToRead = text.substring(currentCharIndex);
            if (!textToRead.trim()) { currentCharIndex = 0; stopReading(); showToast('Lecture terminee.', 'info'); return; }

            totalChars  = text.length;
            charOffset  = currentCharIndex;

            // Prépare et affiche la vue avec surbrillance si on arrive de l'éditeur
            if (textInput.classList.contains('hidden') === false) {
                prepareReadingView(text);
                toggleEditMode(false);
            } else {
                // Déjà en mode lecture (changement voix/vitesse), on enlève juste l'ancienne surbrillance
                const prev = readingView.querySelector('.reading-highlight');
                if (prev) prev.classList.remove('reading-highlight');
            }

            currentUtterance = new SpeechSynthesisUtterance(textToRead);
            currentUtterance.rate = currentRate;
            currentUtterance.lang = 'fr-FR';
            if (selectedVoice) currentUtterance.voice = selectedVoice;

            // Surbrillance dynamique via l'événement boundary
            currentUtterance.onboundary = (e) => {
                if (e.name === 'word') {
                    const absoluteCharIndex = charOffset + e.charIndex;
                    
                    // Retirer l'ancienne surbrillance
                    const prev = readingView.querySelector('.reading-highlight');
                    if (prev) prev.classList.remove('reading-highlight');

                    // Trouver le span correspondant au mot en cours
                    const curr = readingView.querySelector(`span[data-start="${absoluteCharIndex}"]`);
                    if (curr) {
                        curr.classList.add('reading-highlight');
                        // Scroller automatiquement vers le mot lu dans la vue fixe de 7 lignes
                        curr.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                    currentCharIndex = absoluteCharIndex;
                    updateProgress();
                }
            };

            currentUtterance.onend = () => {
                if (isReading && !isPaused) {
                    currentCharIndex = totalChars;
                    stopReading();
                    showToast('Lecture terminee.', 'info');
                }
            };

            currentUtterance.onerror = (e) => {
                if (e.error !== 'canceled' && e.error !== 'interrupted') {
                    stopReading();
                    showToast('Erreur de synthese vocale.', 'error');
                }
            };

            synth.speak(currentUtterance);
            isReading = true;
            isPaused  = false;

            updateUI();
            startUpdateTimer();
            startKeepAlive();
        }

        function togglePause() {
            if (!isReading) return;
            if (isPaused) { synth.resume(); isPaused = false; } 
            else { synth.pause(); isPaused = true; }
            updateUI();
        }

        function stopReading() {
            synth.cancel();
            isReading = false;
            isPaused  = false;
            currentCharIndex = 0;
            currentUtterance = null;
            stopTimers();
            toggleEditMode(true); // Retour à la textarea
            updateUI();
            updateProgress();
        }

        // === Progression & temps ===
        function updateProgress() {
            const total = textInput.value.length;
            const pct = total > 0 ? Math.min((currentCharIndex / total) * 100, 100) : 0;
            progressBar.style.width = `${pct}%`;
            progressText.textContent = `${Math.round(pct)}%`;

            const remaining = textInput.value.substring(currentCharIndex);
            const t = estimateTime(remaining, currentRate);
            timeRemaining.innerHTML = `<i class="fa-regular fa-clock mr-1 text-accent"></i>Temps restant : ${formatTime(t)}`;
        }

        function startUpdateTimer() { stopUpdateTimer(); updateTimer = setInterval(() => { if (isReading && !isPaused) updateProgress(); }, 400); }
        function stopUpdateTimer() { if (updateTimer) { clearInterval(updateTimer); updateTimer = null; } }

        function startKeepAlive() {
            stopKeepAlive();
            keepAliveTimer = setInterval(() => {
                if (synth.speaking && synth.paused) { synth.resume(); setTimeout(() => synth.pause(), 50); }
            }, 13000);
        }
        function stopKeepAlive() { if (keepAliveTimer) { clearInterval(keepAliveTimer); keepAliveTimer = null; } }
        function stopTimers() { stopUpdateTimer(); stopKeepAlive(); }

        // === Mise à jour interface ===
        function updateUI() {
            if (isReading) {
                btnStart.innerHTML = '<i class="fa-solid fa-rotate-right text-xs"></i><span>Recommencer</span>';
                btnStart.classList.add('reading-active');
                btnPause.disabled = false;
                btnStop.disabled  = false;
                liveBadge.classList.remove('hidden');

                if (isPaused) {
                    pauseIcon.className  = 'fa-solid fa-play text-xs';
                    pauseLabel.textContent = 'Reprendre';
                    liveBadge.innerHTML = '<span class="live-dot w-1.5 h-1.5 rounded-full bg-amber-500 inline-block" style="animation:blink 1.2s ease-in-out infinite"></span> En pause';
                    liveBadge.className = liveBadge.className.replace('bg-accent/10 text-accent', 'bg-amber-50 text-amber-600');
                } else {
                    pauseIcon.className  = 'fa-solid fa-pause text-xs';
                    pauseLabel.textContent = 'Pause';
                    liveBadge.innerHTML = '<span class="live-dot w-1.5 h-1.5 rounded-full bg-accent inline-block"></span> Lecture';
                    liveBadge.className = liveBadge.className.replace('bg-amber-50 text-amber-600', 'bg-accent/10 text-accent');
                }
            } else {
                btnStart.innerHTML = '<i class="fa-solid fa-play text-xs"></i><span>Demarrer</span>';
                btnStart.classList.remove('reading-active');
                btnPause.disabled = true;
                btnStop.disabled  = true;
                pauseIcon.className  = 'fa-solid fa-pause text-xs';
                pauseLabel.textContent = 'Pause';
                liveBadge.classList.add('hidden');
                progressBar.style.width = '0%';
                progressText.textContent = '0%';
            }
        }

        // === Événements ===
        textInput.addEventListener('input', () => {
            updateCounts();
            if (isReading) { stopReading(); showToast('Texte modifie, lecture arretee.', 'info'); }
        });

        btnStart.addEventListener('click', () => startReading(true));
        btnPause.addEventListener('click', togglePause);
        btnStop.addEventListener('click', stopReading);

        voiceSelect.addEventListener('change', () => {
            const idx = parseInt(voiceSelect.value);
            if (!isNaN(idx) && voices[idx]) selectedVoice = voices[idx];
            if (isReading) { startReading(false); showToast('Voix changee en cours de lecture.', 'info'); }
        });

        speedRange.addEventListener('input', () => {
            currentRate = parseFloat(speedRange.value);
            speedValue.textContent = `${currentRate.toFixed(1)}x`;
            updateCounts();
            if (isReading) startReading(false);
        });

        btnSave.addEventListener('click', () => {
            const params = { text: textInput.value, rate: currentRate, voiceIndex: parseInt(voiceSelect.value) || 0 };
            localStorage.setItem('lecture-texte-params', JSON.stringify(params));
            showToast('Parametres sauvegardes avec succes.', 'success');
        });

        btnImport.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => { textInput.value = ev.target.result; updateCounts(); if (isReading) stopReading(); showToast(`Texte importe : ${file.name}`, 'success'); };
            reader.onerror = () => showToast('Erreur lors de l\'import du fichier.', 'error');
            reader.readAsText(file);
            fileInput.value = '';
        });

        btnExport.addEventListener('click', () => {
            const txt = textInput.value;
            if (!txt.trim()) { showToast('Aucun texte a exporter.', 'error'); return; }
            const blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
            const url  = URL.createObjectURL(blob);
            const a    = document.createElement('a');
            a.href = url; a.download = 'texte-lecture.txt';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('Texte exporte avec succes.', 'success');
        });

        // === Restauration des paramètres sauvegardés ===
        function restoreParams() {
            const raw = localStorage.getItem('lecture-texte-params');
            if (!raw) return;
            try {
                const p = JSON.parse(raw);
                if (p.text) textInput.value = p.text;
                if (p.rate) { currentRate = parseFloat(p.rate); speedRange.value = currentRate; speedValue.textContent = `${currentRate.toFixed(1)}x`; }
                updateCounts();
            } catch(e) {}
        }

        // === Initialisation ===
        restoreParams();
        updateCounts();

        if (!synth) {
            showToast('La synthese vocale n\'est pas supportee par votre navigateur.', 'error');
            btnStart.disabled  = true; btnPause.disabled  = true; btnStop.disabled   = true;
        }

        document.addEventListener('keydown', (e) => {
            if (e.target === textInput) return;
            if (e.code === 'Space') { e.preventDefault(); if (isReading) togglePause(); else startReading(true); }
            if (e.code === 'Escape' && isReading) { e.preventDefault(); stopReading(); }
        });
    </script>
</body>
</html>
