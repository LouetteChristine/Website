<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Page de lancement (Cookies)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            text-align: center;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

    <h2>Ouverture via Cookie</h2>
    <button id="boutonCookie">Ouvrir la page et insérer via Cookie</button>

    <script>
        const urlCible = "https://louettechristine.github.io/Website/2026_07_02_jsj/jsj.html";
        const valeurAInserer = "Flux du : treize
13 d : 13 g
Index d : 0
Auriculaire d: 0
13 d : 13 g
0 : Index g
0 : Auriculaire g
13 d : 13 g
";

        document.getElementById("boutonCookie").addEventListener("click", function() {
            // 1. Créer le cookie (valable 1 jour sur tout le site)
            document.cookie = "valeurSequence=" + encodeURIComponent(valeurAInserer) + "; path=/; max-age=86400; SameSite=Lax";

            // 2. Ouvrir la page cible
            window.open(urlCible, "_blank");
        });
    </script>

</body>
</html>
